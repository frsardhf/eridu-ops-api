# Rate limits (per IP). Mounted in setup.sh into /etc/nginx/sites-available/eridu-api
# with __DOMAIN__ substituted. These directives sit in the http context.
limit_req_zone $binary_remote_addr zone=parse:10m rate=5r/m;

# A submission's CORS preflight (OPTIONS) carries no body and triggers no arona
# call, so it must NOT count against the write limit — otherwise each "add me"
# costs two requests (OPTIONS + POST) and a couple of retries trip the limiter.
# An empty key makes nginx skip rate-limiting for that request.
map $request_method $bond100_write_key {
    OPTIONS  "";
    default  $binary_remote_addr;
}
limit_req_zone $bond100_write_key zone=bond100_write:10m rate=20r/m;
# Reads are cheap and public; this only blocks scraping floods, not real browsing.
limit_req_zone $binary_remote_addr zone=bond100_read:10m rate=2r/s;

server {
    server_name __DOMAIN__;
    listen 80;

    # ── Inventory parser (service on :5001) ──
    location /inventory/parse {
        limit_req zone=parse burst=5 nodelay;
        client_max_body_size 10M;
        proxy_pass http://127.0.0.1:5001;
        proxy_read_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Bond 100 Hall (separate service on :5002) ──

    # Submission ("add me") — triggers a rate-limited arona /refresh. Exact-match
    # so it wins over the /bond100/ read prefix below. (Bridge model: removal is
    # handled on arona's side, and there's no admin/moderation queue anymore.)
    location = /bond100/submissions {
        limit_req zone=bond100_write burst=5 nodelay;
        limit_req_status 429;
        client_max_body_size 16k;
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public reads (summary, entries, health). Generous burst for normal browsing.
    location /bond100/ {
        limit_req zone=bond100_read burst=20 nodelay;
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
