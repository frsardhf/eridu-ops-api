# Rate limit: 5 parse requests per minute per IP (with small burst).
# Mounted in setup.sh into /etc/nginx/sites-available/eridu-api with __DOMAIN__ substituted.
limit_req_zone $binary_remote_addr zone=parse:10m rate=5r/m;

server {
    server_name __DOMAIN__;
    listen 80;

    location /inventory/parse {
        limit_req zone=parse burst=5 nodelay;
        client_max_body_size 10M;
        proxy_pass http://127.0.0.1:5001;
        proxy_read_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
